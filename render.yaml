services:
  # Backend API
  - type: web
    name: ai-universe-api
    runtime: python
    rootDir: backend/api
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: LLM_PROVIDER
        value: groq
      - key: LLM_API_KEY
        sync: false   # Set via Render dashboard
      - key: DB_PATH
        value: ./data/db.json
      - key: ADMIN_EMAIL
        value: admin@aiuniverse.com
      - key: ADMIN_PASSWORD
        sync: false   # Set via Render dashboard
      - key: FRONTEND_URL
        value: https://ai-universe-frontend.onrender.com

  # Frontend Static Site
  - type: web
    name: ai-universe-frontend
    env: static
    rootDir: frontend
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://ai-universe-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
