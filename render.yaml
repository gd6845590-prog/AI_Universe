services:
  - type: web
    name: ai-universe-api
    runtime: python
    rootDir: backend/api
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: LLM_PROVIDER
        value: groq
      - key: LLM_API_KEY
        sync: false   # Set via Render dashboard
      - key: DB_PATH
        value: ./data/db.json
      - key: ADMIN_EMAIL
        value: admin@aiuniverse.com
      - key: ADMIN_PASSWORD
        sync: false   # Set via Render dashboard
      - key: FRONTEND_URL
        sync: false   # Set to your Vercel URL after deploy
